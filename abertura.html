<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MANO BROWN — SOUL TRAIN · Abertura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/abertura.css">
</head>
<body>

  <!-- SVG symbols -->
  <svg aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden;">
    <defs>
      <symbol id="ada-sym" viewBox="225 225 126 126">
        <polygon fill="currentColor" points="268.01 297 288 257.02 307.99 297 324 297 288 225 252 297 268.01 297"/>
        <polygon fill="currentColor" points="238.5 324 225 351 241.01 351 250.01 333 254.51 324 238.5 324"/>
        <polygon fill="currentColor" points="321.49 324 325.99 333 334.99 351 351 351 337.5 324 321.49 324"/>
      </symbol>
    </defs>
  </svg>

  <!-- Grain overlay -->
  <div class="grain" aria-hidden="true"></div>

  <!-- Fogo -->
  <div class="fire-stage" aria-hidden="true">
    <div class="fire-glow"></div>
    <div class="flames">
      <div class="flame f1"><span></span><span></span><span></span></div>
      <div class="flame f2"><span></span><span></span><span></span></div>
      <div class="flame f3"><span></span><span></span><span></span></div>
      <div class="flame f4"><span></span><span></span><span></span></div>
      <div class="flame f5"><span></span><span></span><span></span></div>
      <div class="flame f6"><span></span><span></span><span></span></div>
      <div class="flame f7"><span></span><span></span><span></span></div>
    </div>
    <!-- Trilho -->
    <div class="rail">
      <div class="rail-l"></div>
      <div class="rail-r"></div>
      <div class="ties"></div>
    </div>
  </div>

  <!-- Conteúdo central -->
  <main class="stage">

    <!-- Marca ADA -->
    <div class="ada-mark">
      <svg width="18" style="color:#FFD600"><use href="#ada-sym"/></svg>
      <span>Ateliê Digital Analógico · 2026</span>
    </div>

    <!-- Bloco de texto principal -->
    <div class="copy">

      <p class="copy-pre">
        Antes do streaming.<br>
        Antes do algoritmo.<br>
        O baile já era real.
      </p>

      <div class="copy-divider"></div>

      <h1 class="copy-title">
        <span class="line-mb">MANO<br>BROWN</span>
        <span class="copy-x">×</span>
        <span class="line-st">SOUL<br>TRAIN</span>
      </h1>

      <div class="copy-divider"></div>

      <p class="copy-post">
        A chama não é nostalgia.<br>É sinal.
      </p>

    </div>

    <!-- Link para a apresentação -->
    <a class="btn-enter" href="index.html">
      Ver apresentação
      <svg width="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
        <path d="M1 5h8M5 1l4 4-4 4" stroke="currentColor" stroke-width="1"/>
      </svg>
    </a>

  </main>

  <script src="js/abertura.js"></script>
</body>
</html>
