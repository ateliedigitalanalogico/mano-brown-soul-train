<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MANO-BROWN-SOUL-TRAIN — Aprovação</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #FFD600;
      --black: #0A0A0A;
      --white: #F5F5F0;
      --gray: #333333;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 3rem 2rem;
    }

    .alfa {
      color: var(--yellow);
      width: 80px;
      height: auto;
    }

    .label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--yellow);
      opacity: 0.7;
    }

    .project-name {
      font-size: clamp(1.5rem, 4vw, 2.8rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-align: center;
      line-height: 1.1;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--yellow);
      opacity: 0.4;
    }

    .status-block {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      align-items: center;
    }

    .status-title {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--white);
      opacity: 0.5;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid var(--yellow);
      border-radius: 2px;
      padding: 0.4rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--yellow);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--yellow);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    footer {
      position: fixed;
      bottom: 2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      color: var(--white);
      opacity: 0.2;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- Alfa ADA -->
  <svg class="alfa" viewBox="225 225 126 126" xmlns="http://www.w3.org/2000/svg" aria-label="ADA">
    <polygon fill="currentColor" points="268.01 297 288 257.02 307.99 297 324 297 288 225 252 297 268.01 297"/>
    <polygon fill="currentColor" points="238.5 324 225 351 241.01 351 250.01 333 254.51 324 238.5 324"/>
    <polygon fill="currentColor" points="321.49 324 325.99 333 334.99 351 351 351 337.5 324 321.49 324"/>
  </svg>

  <span class="label">Ateliê Digital Analógico</span>

  <div class="divider"></div>

  <h1 class="project-name">MANO BROWN<br>SOUL TRAIN</h1>

  <div class="divider"></div>

  <div class="status-block">
    <span class="status-title">Página de Aprovação</span>
    <span class="status-badge">
      <span class="dot"></span>
      Em Produção
    </span>
  </div>

  <footer>ateliedigitalanalogico.com.br</footer>

</body>
</html>
